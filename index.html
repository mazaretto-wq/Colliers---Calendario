<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colliers — Calendario de Marketing</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Open Sans',Verdana,sans-serif}
:root{
  --c-deep:#000759;--c-dark:#25408F;--c-medium:#1C54F4;--c-light:#4D93FF;--c-pale:#C3E6FF;
  --c-dbg:#353E59;--c-dg:#56648F;--c-mg:#7B8BBD;--c-lg:#ACBBE8;--c-pbg:#DBE5FF;
  --c-yellow:#FFD400;--c-red:#ED1B34;--c-teal:#2AB6A9;--c-white:#FFFFFF;--c-grey:#CCCDD5;
  --c-bg:#F4F6FB;
}
body{background:var(--c-bg);min-height:100vh}
.app{max-width:980px;margin:0 auto;background:var(--c-white);min-height:100vh;box-shadow:0 0 24px rgba(0,7,89,0.08)}
.brand-header{background:var(--c-dark);padding:12px 20px;display:flex;align-items:center;gap:10px}
.brand-accent{width:28px;height:3px;background:var(--c-yellow)}
.brand-title{color:var(--c-white);font-size:15px;font-weight:700;letter-spacing:0.3px}
.brand-sub{color:var(--c-lg);font-size:12px;font-weight:400;margin-left:auto}
.main{padding:1.25rem 1.5rem}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:2px solid var(--c-pbg)}
.tab{padding:9px 20px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--c-mg);border-bottom:3px solid transparent;margin-bottom:-2px;letter-spacing:0.5px;text-transform:uppercase}
.tab.active{color:var(--c-dark);border-bottom:3px solid var(--c-medium)}
.tab:hover{color:var(--c-dark)}
.nav-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.nav-row h2{font-size:17px;font-weight:700;flex:1;text-align:center;color:var(--c-deep)}
.nav-btn{background:none;border:1.5px solid var(--c-lg);border-radius:2px;padding:5px 14px;cursor:pointer;font-size:15px;color:var(--c-dark);font-weight:700}
.nav-btn:hover{background:var(--c-pbg);border-color:var(--c-medium)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--c-pbg);border-left:3px solid var(--c-medium);border-radius:2px;padding:12px 14px}
.stat-label{font-size:10px;font-weight:700;color:var(--c-dg);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px}
.stat-val{font-size:24px;font-weight:700;color:var(--c-deep)}
.stat-sub{font-size:11px;color:var(--c-mg);margin-top:2px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1.5rem}
.cal-header{text-align:center;font-size:10px;font-weight:700;color:var(--c-dark);padding:5px;text-transform:uppercase;letter-spacing:0.6px}
.cal-day{border:1px solid var(--c-pbg);border-radius:2px;min-height:78px;padding:5px;cursor:pointer;background:var(--c-white);position:relative;transition:border-color 0.15s}
.cal-day:hover{border-color:var(--c-medium);background:var(--c-pbg)}
.cal-day.empty{background:none;border:none;cursor:default}
.cal-day.weekend{background:#F8FAFF}
.cal-day.today{border:2px solid var(--c-medium)}
.cal-day.selected{border:2px solid var(--c-dark);background:var(--c-pbg)}
.day-num{font-size:11px;font-weight:700;color:var(--c-dg);margin-bottom:3px}
.day-tags{display:flex;flex-wrap:wrap;gap:2px}
.tag{font-size:8px;padding:1px 5px;border-radius:1px;font-weight:700;letter-spacing:0.2px;white-space:nowrap}
.tag-ig{background:#1C54F4;color:#fff}
.tag-em{background:#2AB6A9;color:#fff}
.tag-li{background:#25408F;color:#fff}
.tag-fb{background:#4D93FF;color:#fff}
.tag-x{background:#353E59;color:#fff}
.tag-done{background:#ACBBE8;color:#000759;text-decoration:line-through}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,7,89,0.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--c-white);border-radius:4px;border-top:4px solid var(--c-medium);padding:1.5rem;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:13px;font-weight:700;color:var(--c-deep);margin-bottom:1.25rem;text-transform:uppercase;letter-spacing:0.4px;display:flex;justify-content:space-between;align-items:center}
.modal-date{font-size:12px;color:var(--c-mg);font-weight:400;text-transform:none;letter-spacing:0}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--c-mg);line-height:1}
.modal-close:hover{color:var(--c-red)}
.form-row{margin-bottom:12px}
.form-row label{font-size:10px;font-weight:700;color:var(--c-dg);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.form-row select,.form-row textarea{width:100%;font-size:13px;border-radius:2px;border:1.5px solid var(--c-lg);padding:7px 9px;background:var(--c-white);color:var(--c-deep);font-family:'Open Sans',Verdana,sans-serif}
.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--c-medium)}
.form-row textarea{resize:vertical;min-height:56px}
.form-check{display:flex;align-items:center;gap:8px;margin-top:4px}
.form-check input{width:16px;height:16px;cursor:pointer;accent-color:var(--c-teal)}
.form-check label{font-size:13px;color:var(--c-deep);font-weight:400;text-transform:none;letter-spacing:0}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-primary{background:var(--c-dark);color:var(--c-white);border:none;border-radius:2px;padding:9px 16px;font-size:12px;cursor:pointer;font-weight:700;flex:1;letter-spacing:0.3px;text-transform:uppercase;font-family:'Open Sans',Verdana,sans-serif}
.btn-primary:hover{background:var(--c-deep)}
.btn-secondary{background:none;border:1.5px solid var(--c-lg);border-radius:2px;padding:9px 14px;font-size:12px;cursor:pointer;color:var(--c-mg);font-family:'Open Sans',Verdana,sans-serif;font-weight:600}
.btn-secondary:hover{background:#FDECEA;color:var(--c-red);border-color:var(--c-red)}
.content-list{margin-top:4px}
.content-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--c-pbg)}
.content-item:last-child{border-bottom:none}
.check-btn{width:20px;height:20px;min-width:20px;border-radius:1px;border:1.5px solid var(--c-lg);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
.check-btn.done{background:var(--c-teal);border-color:var(--c-teal);color:white}
.item-info{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:600;color:var(--c-deep)}
.item-title.done{text-decoration:line-through;color:var(--c-mg)}
.item-badges{display:flex;gap:4px;flex-wrap:wrap;margin:3px 0}
.badge{font-size:9px;padding:2px 6px;border-radius:1px;font-weight:700;letter-spacing:0.2px}
.badge-area{background:var(--c-pbg);color:var(--c-dark)}
.badge-canal{color:#fff}
.badge-resp{background:#F0F0F8;color:var(--c-dbg);border:1px solid var(--c-pbg)}
.item-meta{font-size:11px;color:var(--c-mg);margin-top:2px}
.del-btn{background:none;border:none;cursor:pointer;color:var(--c-grey);font-size:14px;padding:2px 4px;margin-top:1px;line-height:1}
.del-btn:hover{color:var(--c-red)}
.edit-btn{background:none;border:none;cursor:pointer;color:var(--c-grey);font-size:13px;padding:2px 4px;margin-top:1px;line-height:1}
.edit-btn:hover{color:var(--c-medium)}
.add-btn{position:absolute;bottom:3px;right:4px;background:none;border:none;color:var(--c-lg);cursor:pointer;font-size:15px;padding:1px;line-height:1}
.add-btn:hover{color:var(--c-medium)}
.section-title{font-size:12px;font-weight:700;color:var(--c-deep);margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.5px;padding-bottom:6px;border-bottom:2px solid var(--c-pbg)}
.divider{border:none;border-top:2px solid var(--c-pbg);margin:1.25rem 0}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.btn-add-detail{background:var(--c-dark);color:white;border:none;border-radius:2px;padding:7px 14px;font-size:11px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;font-family:'Open Sans',Verdana,sans-serif}
.btn-add-detail:hover{background:var(--c-deep)}
.empty-msg{font-size:12px;color:var(--c-mg);text-align:center;padding:1.5rem 0;font-style:italic}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--c-dg)}
.legend-dot{width:10px;height:10px;border-radius:1px}

/* ── MODERN DASHBOARD ── */
.dash-hero{background:linear-gradient(135deg,#25408F 0%,#1C54F4 100%);border-radius:10px;padding:20px 24px;display:flex;align-items:center;gap:20px;margin-bottom:22px;box-shadow:0 4px 20px rgba(37,64,143,0.25)}
.dash-hero-ring{flex-shrink:0}
.dash-hero-info{flex:1}
.dash-hero-total{font-size:44px;font-weight:700;color:#fff;line-height:1}
.dash-hero-label{font-size:11px;color:rgba(255,255,255,0.65);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
.dash-hero-pills{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.dash-hero-pill{background:rgba(255,255,255,0.15);border-radius:8px;padding:8px 14px;text-align:center;min-width:72px}
.dash-hero-pill-val{font-size:20px;font-weight:700;color:#fff}
.dash-hero-pill-label{font-size:10px;color:rgba(255,255,255,0.65);margin-top:1px}
.dash-section{margin-bottom:22px}
.dash-s-title{font-size:11px;font-weight:700;color:var(--c-mg);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:2px solid var(--c-pbg)}
.dash-s-title::before{content:'';display:block;width:3px;height:14px;background:var(--c-medium);border-radius:2px;flex-shrink:0}
.area-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.area-bar-name{width:148px;font-size:11px;font-weight:600;color:var(--c-deep);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.area-bar-track{flex:1;background:var(--c-pbg);height:8px;border-radius:4px;overflow:hidden}
.area-bar-fill{height:8px;border-radius:4px;background:linear-gradient(90deg,#25408F,#1C54F4);transition:width 0.4s ease}
.area-bar-nums{width:84px;font-size:10px;color:var(--c-mg);text-align:right;flex-shrink:0}
.resp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}
.resp-card{background:var(--c-white);border:1px solid var(--c-pbg);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:box-shadow 0.15s}
.resp-card:hover{box-shadow:0 4px 14px rgba(37,64,143,0.1)}
.resp-av{width:42px;height:42px;border-radius:50%;color:white;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:0.5px}
.resp-body{flex:1;min-width:0}
.resp-name{font-size:12px;font-weight:700;color:var(--c-deep)}
.resp-count{font-size:26px;font-weight:700;color:var(--c-medium);line-height:1.1}
.resp-sub{font-size:10px;color:var(--c-mg);margin-top:1px}
.resp-mini-track{background:var(--c-pbg);height:3px;border-radius:2px;margin-top:6px;overflow:hidden}
.resp-mini-fill{height:3px;border-radius:2px;transition:width 0.4s}
.canal-grid{display:flex;flex-wrap:wrap;gap:8px}
.canal-chip{border-radius:8px;padding:12px 16px;color:white;display:flex;flex-direction:column;gap:3px;min-width:95px}
.canal-chip-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;opacity:0.85}
.canal-chip-total{font-size:28px;font-weight:700;line-height:1}
.canal-chip-done{font-size:10px;opacity:0.75}
.tipo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px}
.tipo-card{background:var(--c-bg);border:1px solid var(--c-pbg);border-radius:6px;padding:10px 12px}
.tipo-card-name{font-size:10px;font-weight:700;color:var(--c-dg);text-transform:uppercase;letter-spacing:0.4px}
.tipo-card-count{font-size:26px;font-weight:700;color:var(--c-deep);margin:4px 0;line-height:1}
.tipo-card-sub{font-size:10px;color:var(--c-mg)}
.tipo-card-bar{background:var(--c-pbg);height:3px;border-radius:2px;margin-top:7px;overflow:hidden}
.tipo-card-fill{height:3px;border-radius:2px;background:var(--c-yellow)}
.month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:4px}
.month-card2{background:var(--c-white);border:1px solid var(--c-pbg);border-top:3px solid var(--c-pbg);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all 0.15s}
.month-card2:hover{box-shadow:0 4px 16px rgba(37,64,143,0.12)}
.month-card2.has-data{border-top-color:var(--c-medium)}
.month-card2-name{font-size:11px;font-weight:700;color:var(--c-deep);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.month-card2-big{font-size:30px;font-weight:700;color:var(--c-dark);line-height:1}
.month-card2-sub{font-size:10px;color:var(--c-mg);margin-top:2px}
.month-card2-pct{font-size:11px;font-weight:700;color:var(--c-medium);margin-top:4px}
.month-prog{background:var(--c-pbg);height:4px;border-radius:2px;margin-top:8px;overflow:hidden}
.month-prog-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,#25408F,#1C54F4)}

/* ── TRANSICIONES GLOBALES ── */
body,body *{transition:background-color 0.3s,color 0.3s,border-color 0.3s,box-shadow 0.3s}
/* Excluir transiciones que no deben animarse */
.area-bar-fill,.resp-mini-fill,.tipo-card-fill,.month-prog-fill,.prog-fill{transition:width 0.4s ease!important}

/* ── TOGGLE BUTTON ── */
.theme-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;border-radius:20px;padding:4px 12px;cursor:pointer;font-size:15px;margin-left:auto;line-height:1.5;letter-spacing:0}
.theme-btn:hover{background:rgba(255,255,255,0.24)}

/* ── MODO NOCHE ── */
body.dark{background:#0d1117;--c-deep:#e6edf3;--c-pbg:#30363d;--c-dg:#8b949e;--c-mg:#8b949e;--c-lg:#30363d;--c-bg:#0d1117;--c-grey:#30363d;--c-dbg:#8b949e}

body.dark .empty-msg{color:#8b949e}
body.dark .legend-item{color:#8b949e}
body.dark .dash-hero-pill{background:rgba(255,255,255,0.12)}
body.dark .dash-s-title{border-bottom-color:#30363d;color:#8b949e}
body.dark .area-bar-track{background:#30363d}
body.dark .resp-card{background:#1c2128;border-color:#30363d}
body.dark .resp-name{color:#e6edf3}
body.dark .resp-mini-track{background:#30363d}

body.dark .tipo-card{background:#1c2128;border-color:#30363d}
body.dark .tipo-card-name{color:#8b949e}
body.dark .tipo-card-count{color:#e6edf3}
body.dark .tipo-card-bar{background:#30363d}
body.dark .month-card2{background:#1c2128;border-color:#30363d}
body.dark .month-card2:hover{box-shadow:0 4px 16px rgba(0,0,0,0.4)}

body.dark .area-bar-nums{color:#8b949e}
</style>
</head>

  </div>
</div>

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

firebase.initializeApp(firebaseConfig);
const firebaseDb=firebase.database();
const calendarRef=firebaseDb.ref('calendar_data');

const today=new Date();
let S={view:'calendar',year:today.getFullYear(),month:today.getMonth(),selectedDay:null,showModal:false,editIdx:null,data:{}};

function dayKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

function getMonthData(y,m){
  const pre=`${y}-${String(m+1).padStart(2,'0')}-`;
  let total=0,done=0,byArea={},byCanal={},byResp={};
  AREAS.forEach(a=>byArea[a]={total:0,done:0});
  CANALES.forEach(c=>byCanal[c]={total:0,done:0});
  RESPONSABLES.forEach(r=>byResp[r]={total:0,done:0});
  Object.keys(S.data).filter(k=>k.startsWith(pre)).forEach(k=>{
    (S.data[k]||[]).forEach(it=>{
      total++;
      if(it.done)done++;
      if(byArea[it.area]){byArea[it.area].total++;if(it.done)byArea[it.area].done++;}
      if(byCanal[it.canal]){byCanal[it.canal].total++;if(it.done)byCanal[it.canal].done++;}
      if(it.resp&&byResp[it.resp]){byResp[it.resp].total++;if(it.done)byResp[it.resp].done++;}
    });
  });
  return{total,done,pending:total-done,byArea,byCanal,byResp};
}

function workdaysLeft(y,m){
  const now=new Date(),last=new Date(y,m+1,0).getDate();
  const start=(y===now.getFullYear()&&m===now.getMonth())?now.getDate():1;
  let c=0;
  for(let d=start;d<=last;d++){const wd=new Date(y,m,d).getDay();if(wd&&wd<6)c++;}
  return c;
}

function el(tag,cls,html){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(html!==undefined)e.innerHTML=html;
  return e;
}

function svgRing(pct,size=90){
  const r=36,circ=+(2*Math.PI*r).toFixed(2);
  const fill=+(pct/100*circ).toFixed(2);
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="9"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="#FFD400" stroke-width="9"
      stroke-dasharray="${fill} ${circ}" stroke-linecap="round" transform="rotate(-90 50 50)"/>
    <text x="50" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="white"
      font-family="Open Sans,Verdana,sans-serif">${pct}%</text>
    <text x="50" y="61" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.65)"
      font-family="Open Sans,Verdana,sans-serif">completado</text>
  </svg>`;
}

function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  root.appendChild(renderTabs());
  if(S.view==='calendar')root.appendChild(renderCalendar());
  else if(S.view==='monthly')root.appendChild(renderMonthly());
  else root.appendChild(renderAnnual());
  if(S.showModal)document.body.appendChild(renderModal());
}

function renderTabs(){
  const d=el('div','tabs');
  [['calendar','Calendario'],['monthly','Dashboard Mes'],['annual','Dashboard Anual']].forEach(([v,l])=>{
    const b=el('button','tab'+(S.view===v?' active':''),l);
    b.onclick=()=>{S.view=v;render()};
    d.appendChild(b);
  });
  return d;
}

function navRow(title,onPrev,onNext){
  const r=el('div','nav-row');
  const pb=el('button','nav-btn','&#8249;');pb.onclick=onPrev;
  const nb=el('button','nav-btn','&#8250;');nb.onclick=onNext;
  const t=el('h2','',title);
  r.appendChild(pb);r.appendChild(t);r.appendChild(nb);
  return r;
}

function statsGrid(cards){
  const g=el('div','stats-grid');
  cards.forEach(({l,v,s})=>{
    g.appendChild(el('div','stat-card',`<div class="stat-label">${l}</div><div class="stat-val">${v}</div><div class="stat-sub">${s}</div>`));
  });
  return g;
}

function renderCalendar(){
  const wrap=el('div');
  wrap.appendChild(navRow(MONTHS[S.month]+' '+S.year,
    ()=>{S.month--;if(S.month<0){S.month=11;S.year--;}render()},
    ()=>{S.month++;if(S.month>11){S.month=0;S.year++;}render()}));

  const md=getMonthData(S.year,S.month);
  const pct=md.total?Math.round(md.done/md.total*100):0;
  wrap.appendChild(statsGrid([
    {l:'Subidos',v:md.done,s:`${pct}% completado`},
    {l:'Pendientes',v:md.pending,s:'por subir'},
    {l:'Días hábiles',v:workdaysLeft(S.year,S.month),s:'restantes'},
    {l:'Total planificado',v:md.total,s:'este mes'}
  ]));

  const leg=el('div','legend');
  CANALES.forEach(c=>{
    leg.appendChild(el('div','legend-item',`<div class="legend-dot" style="background:${CANAL_BG[c]}"></div><span>${c}</span>`));
  });
  wrap.appendChild(leg);

  const grid=el('div','calendar-grid');
  DAYS.forEach(d=>grid.appendChild(el('div','cal-header',d)));

  const first=new Date(S.year,S.month,1).getDay();
  const total=new Date(S.year,S.month+1,0).getDate();
  for(let i=0;i<first;i++)grid.appendChild(el('div','cal-day empty'));

  for(let d=1;d<=total;d++){
    const wd=new Date(S.year,S.month,d).getDay();
    let cls='cal-day';
    if(!wd||wd===6)cls+=' weekend';
    if(today.getFullYear()===S.year&&today.getMonth()===S.month&&today.getDate()===d)cls+=' today';
    if(S.selectedDay===d)cls+=' selected';
    const cell=el('div',cls);
    cell.appendChild(el('div','day-num',d));
    const k=dayKey(S.year,S.month,d);
    const items=S.data[k]||[];
    const tags=el('div','day-tags');
    items.slice(0,3).forEach(it=>{
      tags.appendChild(el('span','tag '+(CANAL_COLORS[it.canal]||'tag-ig')+(it.done?' tag-done':''),it.canal));
    });
    if(items.length>3){
      const more=el('span','tag',`+${items.length-3}`);
      more.style='background:#DBE5FF;color:#25408F';
      tags.appendChild(more);
    }
    cell.appendChild(tags);
    const ab=el('button','add-btn','+');
    ab.title='Agregar contenido';
    ab.onclick=(e)=>{e.stopPropagation();S.selectedDay=d;S.editIdx=null;S.showModal=true;render()};
    cell.appendChild(ab);
    cell.onclick=()=>{S.selectedDay=(S.selectedDay===d?null:d);render()};
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);

  if(S.selectedDay){
    wrap.appendChild(el('hr','divider'));
    const k=dayKey(S.year,S.month,S.selectedDay);
    const items=S.data[k]||[];
    const dh=el('div','detail-header');
    const dt=el('p','section-title',`${S.selectedDay} de ${MONTHS[S.month]}`);
    dt.style='margin:0;border:none;padding:0';
    const ab2=el('button','btn-add-detail','+ Agregar');
    ab2.onclick=()=>{S.editIdx=null;S.showModal=true;render()};
    dh.appendChild(dt);dh.appendChild(ab2);
    wrap.appendChild(dh);
    if(!items.length){
      wrap.appendChild(el('p','empty-msg','Sin contenido planificado para este día'));
    } else {
      const cl=el('div','content-list');
      items.forEach((item,idx)=>{
        const row=el('div','content-item');
        const cb=el('button','check-btn'+(item.done?' done':''),item.done?'✓':'');
        cb.onclick=()=>{S.data[k][idx].done=!S.data[k][idx].done;save(S.data);render()};
        const info=el('div','item-info');
        const title=el('div','item-title'+(item.done?' done':''),item.tipo);
        const badges=el('div','item-badges');
        badges.appendChild(el('span','badge badge-area',item.area));
        const cb2=el('span','badge badge-canal',item.canal);
        cb2.style=`background:${CANAL_BG[item.canal]||'#1C54F4'}`;
        badges.appendChild(cb2);
        if(item.resp)badges.appendChild(el('span','badge badge-resp',item.resp));
        const desc=el('div','item-meta',item.desc||'Sin descripción');
        info.appendChild(title);info.appendChild(badges);info.appendChild(desc);
        const eb=el('button','edit-btn','<i class="ti ti-pencil"></i>');
        eb.title='Editar';
        eb.onclick=()=>{S.editIdx=idx;S.showModal=true;render()};
        const db=el('button','del-btn','<i class="ti ti-trash"></i>');
        db.onclick=()=>{S.data[k].splice(idx,1);if(!S.data[k].length)delete S.data[k];save(S.data);render()};
        row.appendChild(cb);row.appendChild(info);row.appendChild(eb);row.appendChild(db);
        cl.appendChild(row);
      });
      wrap.appendChild(cl);
    }
  }
  return wrap;
}

/* ── DASHBOARD MENSUAL ── */
function renderMonthly(){
  const wrap=el('div');
  wrap.appendChild(navRow('Dashboard — '+MONTHS[S.month]+' '+S.year,
    ()=>{S.month--;if(S.month<0){S.month=11;S.year--;}render()},
    ()=>{S.month++;if(S.month>11){S.month=0;S.year++;}render()}));

  const md=getMonthData(S.year,S.month);
  const pct=md.total?Math.round(md.done/md.total*100):0;

  // Hero
  const hero=el('div','dash-hero');
  const rd=el('div','dash-hero-ring');rd.innerHTML=svgRing(pct);hero.appendChild(rd);
  const hi=el('div','dash-hero-info');
  hi.innerHTML=`<div class="dash-hero-total">${md.total}</div>
    <div class="dash-hero-label">Contenidos este mes</div>
    <div class="dash-hero-pills">
      <div class="dash-hero-pill"><div class="dash-hero-pill-val">${md.done}</div><div class="dash-hero-pill-label">Subidos</div></div>
      <div class="dash-hero-pill"><div class="dash-hero-pill-val">${md.pending}</div><div class="dash-hero-pill-label">Pendientes</div></div>
      <div class="dash-hero-pill"><div class="dash-hero-pill-val">${workdaysLeft(S.year,S.month)}</div><div class="dash-hero-pill-label">Días hábiles</div></div>
    </div>`;
  hero.appendChild(hi);wrap.appendChild(hero);

  // Por área
  const areasD=AREAS.filter(a=>md.byArea[a]?.total>0).sort((a,b)=>md.byArea[b].total-md.byArea[a].total);
  if(areasD.length){
    const sec=el('div','dash-section');
    sec.appendChild(el('div','dash-s-title','Por área'));
    areasD.forEach(area=>{
      const ad=md.byArea[area],ap=ad.total?Math.round(ad.done/ad.total*100):0;
      const row=el('div','area-bar-row');
      row.innerHTML=`<div class="area-bar-name">${area}</div>
        <div class="area-bar-track"><div class="area-bar-fill" style="width:${ap}%"></div></div>
        <div class="area-bar-nums">${ad.done}/${ad.total} · ${ap}%</div>`;
      sec.appendChild(row);
    });
    wrap.appendChild(sec);
  }

  // Por responsable
  const respsD=RESPONSABLES.filter(r=>md.byResp[r]?.total>0);
  if(respsD.length){
    const sec=el('div','dash-section');
    sec.appendChild(el('div','dash-s-title','Por responsable'));
    const grid=el('div','resp-grid');
    respsD.forEach(resp=>{
      const rd2=md.byResp[resp],rp=rd2.total?Math.round(rd2.done/rd2.total*100):0;
      const initials=resp.split(' ').map(s=>s[0]).join('').toUpperCase();
      const color=RESP_COLORS[RESPONSABLES.indexOf(resp)];
      const card=el('div','resp-card');
      card.innerHTML=`<div class="resp-av" style="background:${color}">${initials}</div>
        <div class="resp-body">
          <div class="resp-name">${resp}</div>
          <div class="resp-count">${rd2.total}</div>
          <div class="resp-sub">${rd2.done} subidos · ${rp}%</div>
          <div class="resp-mini-track"><div class="resp-mini-fill" style="width:${rp}%;background:${color}"></div></div>
        </div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);wrap.appendChild(sec);
  }

  // Por canal
  const canalesD=CANALES.filter(c=>md.byCanal[c]?.total>0);
  if(canalesD.length){
    const sec=el('div','dash-section');
    sec.appendChild(el('div','dash-s-title','Por canal'));
    const grid=el('div','canal-grid');
    canalesD.forEach(canal=>{
      const cd=md.byCanal[canal];
      const chip=el('div','canal-chip');
      chip.style.background=CANAL_BG[canal];
      chip.innerHTML=`<div class="canal-chip-name">${canal}</div>
        <div class="canal-chip-total">${cd.total}</div>
        <div class="canal-chip-done">${cd.done} subidos</div>`;
      grid.appendChild(chip);
    });
    sec.appendChild(grid);wrap.appendChild(sec);
  }

  // Por tipo
  const pre=`${S.year}-${String(S.month+1).padStart(2,'0')}-`;
  const byTipo={};
  Object.keys(S.data).filter(k=>k.startsWith(pre)).forEach(k=>{
    (S.data[k]||[]).forEach(it=>{
      byTipo[it.tipo]=byTipo[it.tipo]||{total:0,done:0};
      byTipo[it.tipo].total++;if(it.done)byTipo[it.tipo].done++;
    });
  });
  const tiposD=TIPOS.filter(t=>byTipo[t]?.total>0);
  if(tiposD.length){
    const sec=el('div','dash-section');
    sec.appendChild(el('div','dash-s-title','Por tipo de contenido'));
    const grid=el('div','tipo-grid');
    const maxT=Math.max(...tiposD.map(t=>byTipo[t].total));
    tiposD.forEach(t=>{
      const td2=byTipo[t],pBar=maxT?Math.round(td2.total/maxT*100):0;
      const card=el('div','tipo-card');
      card.innerHTML=`<div class="tipo-card-name">${t}</div>
        <div class="tipo-card-count">${td2.total}</div>
        <div class="tipo-card-sub">${td2.done} subidos</div>
        <div class="tipo-card-bar"><div class="tipo-card-fill" style="width:${pBar}%"></div></div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);wrap.appendChild(sec);
  }

  if(!md.total)wrap.appendChild(el('p','empty-msg','Sin contenidos planificados este mes'));
  return wrap;
}

/* ── DASHBOARD ANUAL ── */
function renderAnnual(){
  const wrap=el('div');
  wrap.appendChild(navRow('Resumen Anual '+S.year,
    ()=>{S.year--;render()},
    ()=>{S.year++;render()}));

  let yt=0,yd=0;
  const byA={};AREAS.forEach(a=>byA[a]={total:0,done:0});
  const byC={};CANALES.forEach(c=>byC[c]={total:0,done:0});
  const byR={};RESPONSABLES.forEach(r=>byR[r]={total:0,done:0});
  for(let m=0;m<12;m++){
    const md=getMonthData(S.year,m);
    yt+=md.total;yd+=md.done;
    AREAS.forEach(a=>{byA[a].total+=md.byArea[a]?.total||0;byA[a].done+=md.byArea[a]?.done||0});
    CANALES.forEach(c=>{byC[c].total+=md.byCanal[c]?.total||0;byC[c].done+=md.byCanal[c]?.done||0});
    RESPONSABLES.forEach(r=>{byR[r].total+=md.byResp[r]?.total||0;byR[r].done+=md.byResp[r]?.done||0});
  }
  const yp=yt?Math.round(yd/yt*100):0;

  // Hero
  const hero=el('div','dash-hero');
  const rd=el('div','dash-hero-ring');rd.innerHTML=svgRing(yp);hero.appendChild(rd);
  const hi=el('div','dash-hero-info');
  hi.innerHTML=`<div class="dash-hero-total">${yt}</div>
    <div class="dash-hero-label">Contenidos en ${S.year}</div>
    <div class="dash-hero-pills">
      <div class="dash-hero-pill"><div class="dash-hero-pill-val">${yd}</div><div class="dash-hero-pill-label">Subidos</div></div>
      <div class="dash-hero-pill"><div class="dash-hero-pill-val">${yt-yd}</div><div class="dash-hero-pill-label">Pendientes</div></div>
    </div>`;
  hero.appendChild(hi);wrap.appendChild(hero);

  // Mes a mes
  const mSec=el('div','dash-section');
  mSec.appendChild(el('div','dash-s-title','Mes a mes'));
  const mg=el('div','month-grid');
  for(let m=0;m<12;m++){
    const md=getMonthData(S.year,m);
    const pct=md.total?Math.round(md.done/md.total*100):0;
    const mc=el('div','month-card2'+(md.total?' has-data':''));
    mc.innerHTML=`<div class="month-card2-name">${MONTHS[m]}</div>
      <div class="month-card2-big">${md.total||'—'}</div>
      <div class="month-card2-sub">${md.total?md.done+' subidos':'Sin datos'}</div>
      ${md.total?`<div class="month-card2-pct">${pct}% completado</div>`:''}
      <div class="month-prog"><div class="month-prog-fill" style="width:${pct}%"></div></div>`;
    mc.onclick=()=>{S.month=m;S.view='monthly';render()};
    mg.appendChild(mc);
  }
  mSec.appendChild(mg);wrap.appendChild(mSec);

  // Por área
  const areasDA=AREAS.filter(a=>byA[a].total>0).sort((a,b)=>byA[b].total-byA[a].total);
  if(areasDA.length){
    const sec=el('div','dash-section');
    sec.appendChild(el('div','dash-s-title','Por área — año completo'));
    areasDA.forEach(area=>{
      const ad=byA[area],ap=ad.total?Math.round(ad.done/ad.total*100):0;
      const row=el('div','area-bar-row');
      row.innerHTML=`<div class="area-bar-name">${area}</div>
        <div class="area-bar-track"><div class="area-bar-fill" style="width:${ap}%"></div></div>
        <div class="area-bar-nums">${ad.done}/${ad.total} · ${ap}%</div>`;
      sec.appendChild(row);
    });
    wrap.appendChild(sec);
  }

  // Por responsable
  const respsDA=RESPONSABLES.filter(r=>byR[r].total>0);
  if(respsDA.length){
    const sec=el('div','dash-section');
    sec.appendChild(el('div','dash-s-title','Por responsable — año completo'));
    const grid=el('div','resp-grid');
    respsDA.forEach(resp=>{
      const rd2=byR[resp],rp=rd2.total?Math.round(rd2.done/rd2.total*100):0;
      const initials=resp.split(' ').map(s=>s[0]).join('').toUpperCase();
      const color=RESP_COLORS[RESPONSABLES.indexOf(resp)];
      const card=el('div','resp-card');
      card.innerHTML=`<div class="resp-av" style="background:${color}">${initials}</div>
        <div class="resp-body">
          <div class="resp-name">${resp}</div>
          <div class="resp-count">${rd2.total}</div>
          <div class="resp-sub">${rd2.done} subidos · ${rp}%</div>
          <div class="resp-mini-track"><div class="resp-mini-fill" style="width:${rp}%;background:${color}"></div></div>
        </div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);wrap.appendChild(sec);
  }

  // Por canal
  const canalesDA=CANALES.filter(c=>byC[c].total>0);
  if(canalesDA.length){
    const sec=el('div','dash-section');
    sec.appendChild(el('div','dash-s-title','Por canal — año completo'));
    const grid=el('div','canal-grid');
    canalesDA.forEach(canal=>{
      const cd=byC[canal];
      const chip=el('div','canal-chip');
      chip.style.background=CANAL_BG[canal];
      chip.innerHTML=`<div class="canal-chip-name">${canal}</div>
        <div class="canal-chip-total">${cd.total}</div>
        <div class="canal-chip-done">${cd.done} subidos</div>`;
      grid.appendChild(chip);
    });
    sec.appendChild(grid);wrap.appendChild(sec);
  }

  return wrap;
}

/* ── MODAL ── */
function renderModal(){
  const k=dayKey(S.year,S.month,S.selectedDay);
  const isEdit=S.editIdx!==null;
  const item=isEdit?(S.data[k]||[])[S.editIdx]:{tipo:TIPOS[0],area:AREAS[0],resp:RESPONSABLES[0],canal:CANALES[0],desc:'',done:false};
  const overlay=el('div','modal-overlay');
  const m=el('div','modal');
  m.innerHTML=`
    <div class="modal-title">
      <span>${isEdit?'Editar':'Agregar'} contenido</span>
      <button class="modal-close" id="mc">✕</button>
    </div>
    <div class="modal-date">${S.selectedDay} de ${MONTHS[S.month]} ${S.year}</div><br>
    <div class="form-row">
      <label>Tipo de contenido</label>
      <select id="fi-tipo">${TIPOS.map(t=>`<option${t===item.tipo?' selected':''}>${t}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <label>Área de la empresa</label>
      <select id="fi-area">${AREAS.map(a=>`<option${a===item.area?' selected':''}>${a}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <label>Responsable</label>
      <select id="fi-resp">${RESPONSABLES.map(r=>`<option${r===item.resp?' selected':''}>${r}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <label>Canal / Sitio</label>
      <select id="fi-canal">${CANALES.map(c=>`<option${c===item.canal?' selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <label>Descripción</label>
      <textarea id="fi-desc" placeholder="Ej: Post sobre lanzamiento en Oficinas...">${item.desc||''}</textarea>
    </div>
    <div class="form-row">
      <div class="form-check">
        <input type="checkbox" id="fi-done"${item.done?' checked':''}>
        <label for="fi-done">Marcar como subido</label>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="fi-save">${isEdit?'Guardar cambios':'Agregar'}</button>
      ${isEdit?'<button class="btn-secondary" id="fi-del">Eliminar</button>':''}
    </div>`;
  overlay.appendChild(m);
  setTimeout(()=>{
    document.getElementById('mc').onclick=()=>{S.showModal=false;overlay.remove();render()};
    document.getElementById('fi-save').onclick=()=>{
      const tipo=document.getElementById('fi-tipo').value;
      const area=document.getElementById('fi-area').value;
      const resp=document.getElementById('fi-resp').value;
      const canal=document.getElementById('fi-canal').value;
      const desc=document.getElementById('fi-desc').value;
      const done=document.getElementById('fi-done').checked;
      if(!S.data[k])S.data[k]=[];
      if(isEdit)S.data[k][S.editIdx]={tipo,area,resp,canal,desc,done};
      else S.data[k].push({tipo,area,resp,canal,desc,done});
      save(S.data);S.showModal=false;overlay.remove();render();
    };
    const fd=document.getElementById('fi-del');
    if(fd)fd.onclick=()=>{
      S.data[k].splice(S.editIdx,1);
      if(!S.data[k].length)delete S.data[k];
      save(S.data);S.showModal=false;overlay.remove();S.editIdx=null;render();
    };
    overlay.onclick=(e)=>{if(e.target===overlay){S.showModal=false;overlay.remove();render()}};
  },30);
  return overlay;
}

calendarRef.on('value',(snap)=>{S.data=snap.val()||{};render();});

// ── TEMA ──
function toggleTheme(){
  const isDark=document.body.classList.toggle('dark');
  localStorage.setItem('colliers_theme',isDark?'dark':'light');
  document.getElementById('theme-btn').textContent=isDark?'☀️':'🌙';
}
// Sincronizar ícono con tema guardado al cargar
(function(){
  if(document.body.classList.contains('dark'))
    document.getElementById('theme-btn').textContent='☀️';
})();
</script>
